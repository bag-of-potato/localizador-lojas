<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Localizador de Loja</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .app {
      width: 100%;
      max-width: 420px;
      background: #fff;
      min-height: 100vh;
    }

    .header {
      background: #1a5bbf;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 62px;
      position: relative;
    }

    .header-title {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      text-align: center;
    }

    .back-btn {
      position: absolute;
      left: 16px;
      background: #1a5bbf;
      border: 2px solid #fff;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      padding: 5px 12px;
      border-radius: 6px;
      font-family: inherit;
    }

    .screen { display: none; padding: 24px 16px; }
    .screen.active { display: block; }

    .logo-center {
      display: flex;
      justify-content: center;
      margin-bottom: 28px;
      margin-top: 8px;
    }

    .logo-center img {
      width: 200px;
      object-fit: contain;
    }

    .search-label {
      font-size: 14px;
      font-weight: 600;
      color: #222;
      margin-bottom: 8px;
      display: block;
    }

    .search-input {
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 15px;
      font-family: inherit;
      color: #222;
      background: #f0f0f0;
      outline: none;
      margin-bottom: 12px;
    }

    .search-input:focus { border-color: #1a5bbf; background: #fff; }

    .search-btn {
      width: 100%;
      background: #1a5bbf;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }

    .search-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .search-btn:active:not(:disabled) { opacity: 0.85; }

    .loading-msg {
      text-align: center;
      font-size: 13px;
      color: #aaa;
      padding: 8px 0 12px;
      display: none;
    }

    .error-msg {
      font-size: 13px;
      color: #c0392b;
      margin-top: 10px;
      display: none;
      padding: 10px 12px;
      background: #fdecea;
      border-radius: 8px;
    }

    .result-label {
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 10px;
    }

    .store-card {
      background: #f0f0f0;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 20px;
    }

    .store-id {
      font-size: 14px;
      font-weight: 700;
      color: #222;
      margin-bottom: 2px;
    }

    .store-name {
      font-size: 16px;
      font-weight: 700;
      color: #222;
      margin-bottom: 10px;
    }

    .info-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: #222;
      margin-bottom: 6px;
    }

    .copy-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 4px;
      font-size: 16px;
      color: #555;
      margin-left: 2px;
      font-family: inherit;
    }

    .copy-btn.copied { color: #27ae60; font-size: 13px; }

    .divider {
      border: none;
      border-top: 1px solid #ccc;
      margin: 4px 0 20px;
    }

    .nav-btn {
      width: 100%;
      padding: 13px;
      border-radius: 8px;
      border: none;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      text-align: center;
      margin-bottom: 10px;
      transition: opacity 0.15s;
      background: #1a5bbf;
      color: #fff;
    }

    .nav-btn:last-child { margin-bottom: 0; }
    .nav-btn:active { opacity: 0.8; }
  </style>
</head>

    <p class="loading-msg" id="loading-msg">⏳ Carregando lojas...</p>

    <label class="search-label" for="id-input">Encontre uma loja pelo ID</label>
    <input
      class="search-input"
      id="id-input"
      type="number"
      placeholder="Digite o ID da loja"
      inputmode="numeric"
    />
    <button class="search-btn" id="search-btn" onclick="buscar()">Buscar</button>
    <p class="error-msg" id="error-msg">❌ Loja não encontrada. Verifique o ID e tente novamente.</p>
  </div>

  <div class="screen" id="screen-result">
    <p class="result-label">Resultado da busca</p>
    <div class="store-card">
      <p class="store-id" id="res-id"></p>
      <p class="store-name" id="res-name"></p>
      <div class="info-row">
        <span id="res-addr"></span>
        <button class="copy-btn" id="copy-addr-btn" title="Copiar endereço">&#x2398;</button>
      </div>
      <div class="info-row">
        <span>Tel: </span><span id="res-tel"></span>
        <button class="copy-btn" id="copy-tel-btn" title="Copiar telefone">&#x2398;</button>
      </div>
    </div>

    <hr class="divider">

    <button class="nav-btn" id="btn-maps">Abrir no Google Maps</button>
    <button class="nav-btn" id="btn-waze">Abrir no Waze</button>
  </div>

</div>

<script>
  var lojas = {};
  var lojaAtual = null;

  async function carregarLojas() {
    var btn = document.getElementById("search-btn");
    var loadingMsg = document.getElementById("loading-msg");
    btn.disabled = true;
    loadingMsg.style.display = "block";
    try {
      var resposta = await fetch("lojas.json");
      if (!resposta.ok) throw new Error("erro");
      lojas = await resposta.json();
      loadingMsg.style.display = "none";
      btn.disabled = false;
    } catch (e) {
      loadingMsg.textContent = "❌ Erro ao carregar lojas. Verifique o arquivo lojas.json.";
    }
  }

  function buscar() {
    var id = document.getElementById("id-input").value.trim();
    var err = document.getElementById("error-msg");
    err.style.display = "none";
    if (!id || !lojas[id]) {
      err.style.display = "block";
      return;
    }
    lojaAtual = { id: id, nome: lojas[id].nome, end: lojas[id].end, tel: lojas[id].tel };
    document.getElementById("res-id").textContent = "ID: " + id;
    document.getElementById("res-name").textContent = lojaAtual.nome;
    document.getElementById("res-addr").textContent = lojaAtual.end;
    document.getElementById("res-tel").textContent = lojaAtual.tel;
    resetCopyBtns();
    document.getElementById("screen-search").classList.remove("active");
    document.getElementById("screen-result").classList.add("active");
    document.getElementById("main-header").innerHTML =
      "<button class='back-btn' onclick='voltar()'>&#8592; Voltar</button>" +
      "<span class='header-title'>Localizador de loja</span>";
  }

  function voltar() {
    document.getElementById("screen-result").classList.remove("active");
    document.getElementById("screen-search").classList.add("active");
    document.getElementById("id-input").value = "";
    document.getElementById("error-msg").style.display = "none";
    document.getElementById("main-header").innerHTML =
      "<span class='header-title'>Localizador de loja</span>";
  }

  document.getElementById("copy-addr-btn").addEventListener("click", function() {
    if (!lojaAtual) return;
    navigator.clipboard.writeText(lojaAtual.end).catch(function(){});
    var btn = document.getElementById("copy-addr-btn");
    btn.classList.add("copied");
    btn.textContent = "✓ copiado";
    setTimeout(function() {
      btn.classList.remove("copied");
      btn.innerHTML = "&#x2398;";
    }, 2000);
  });

  document.getElementById("copy-tel-btn").addEventListener("click", function() {
    if (!lojaAtual) return;
    navigator.clipboard.writeText(lojaAtual.tel).catch(function(){});
    var btn = document.getElementById("copy-tel-btn");
    btn.classList.add("copied");
    btn.textContent = "✓ copiado";
    setTimeout(function() {
      btn.classList.remove("copied");
      btn.innerHTML = "&#x2398;";
    }, 2000);
  });

  document.getElementById("btn-maps").addEventListener("click", function() {
    if (!lojaAtual) return;
    var query = encodeURIComponent(lojaAtual.end);
    window.open("https://www.google.com/maps/search/?api=1&query=" + query, "_blank");
  });

  document.getElementById("btn-waze").addEventListener("click", function() {
    if (!lojaAtual) return;
    var query = encodeURIComponent(lojaAtual.end);
    window.open("https://waze.com/ul?q=" + query, "_blank");
  });

  document.getElementById("id-input").addEventListener("keydown", function(e) {
    if (e.key === "Enter") buscar();
  });

  carregarLojas();
</script>

</body>
</html>
